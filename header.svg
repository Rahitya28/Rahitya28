<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100%;
          width: 100%;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background: linear-gradient(45deg, #121212, #1e1e1e, #121212);
          background-size: 200% 200%;
          animation: gradient 10s ease infinite;
          border-radius: 12px;
          color: white;
          text-align: center;
        }

        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .typing-container {
          display: inline-block;
          overflow: hidden;
          white-space: nowrap;
          border-right: .15em solid #00ffcc;
          animation: 
            typing 3.5s steps(40, end),
            blink-caret .75s step-end infinite;
          font-size: 2.5rem;
          font-weight: bold;
          margin-bottom: 0.5rem;
          color: #ffffff;
        }

        .subtitle {
          font-size: 1.2rem;
          color: #a0a0a0;
          opacity: 0;
          animation: fadeIn 2s forwards;
          animation-delay: 3.5s;
        }

        @keyframes typing {
          from { width: 0 }
          to { width: 100% }
        }

        @keyframes blink-caret {
          from, to { border-color: transparent }
          50% { border-color: #00ffcc; }
        }

        @keyframes fadeIn {
          to { opacity: 1; }
        }
      </style>
      <div class="wrapper">
        <!-- EDIT YOUR NAME HERE -->
        <div class="typing-container">Hi, I'm Rahitya Chennam 👋</div>
        <!-- EDIT YOUR SUBTITLE HERE -->
        <div class="subtitle">B.Tech CSE Student | Full Stack Developer | ML Enthusiast</div>
      </div>
    </div>
  </foreignObject>
</svg>
